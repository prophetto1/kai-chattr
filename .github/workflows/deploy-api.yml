name: Deploy API to Fly

on:
  push:
    branches: [main, dev]
    paths:
      - "services/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: kai-chattr-api-${{ github.ref_name }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Select Fly target
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "FLY_APP=kai-chattr-api" >> "$GITHUB_ENV"
            echo "FLY_CONFIG=services/api/fly.prod.toml" >> "$GITHUB_ENV"
          else
            echo "FLY_APP=kai-chattr-api-dev" >> "$GITHUB_ENV"
            echo "FLY_CONFIG=services/api/fly.dev.toml" >> "$GITHUB_ENV"
          fi
      - name: Deploy API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config "$FLY_CONFIG" --app "$FLY_APP"
