name: Deploy devdocs to Cloudflare Pages

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/devdocs/**'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build static export
        run: pnpm --filter @kai-chattr/devdocs build
        env:
          NEXT_PUBLIC_DOCS_URL: ${{ vars.NEXT_PUBLIC_DOCS_URL }}
          NEXT_PUBLIC_KAI_CHATTR_WEB_URL: ${{ vars.NEXT_PUBLIC_KAI_CHATTR_WEB_URL }}
      - name: Deploy to Cloudflare Pages (kai-chattr-docs)
        run: pnpm --filter @kai-chattr/devdocs exec wrangler pages deploy out --project-name=kai-chattr-docs --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
