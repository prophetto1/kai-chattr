description = "Start Claude Code through wrapper.py"
cwd = "."
argv = ["uv", "run", "python", "wrapper.py", "claude"]
visible_terminal = true
allow_browser_start = false
requires_explicit_confirmation = false

[profiles."agent.claude.skip-permissions"]
kind = "cli-agent"
description = "Start Claude Code with provider auto-approve flag"
cwd = "."
argv = ["uv", "run", "python", "wrapper.py", "claude", "--dangerously-skip-permissions"]
visible_terminal = true
allow_browser_start = false
requires_explicit_confirmation = true

