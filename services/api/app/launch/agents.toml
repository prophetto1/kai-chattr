[profiles."server.default"]
kind = "server"
description = "Start the Chattr FastAPI/local server"
cwd = "."
argv = ["uv", "run", "python", "run.py"]
visible_terminal = false
allow_browser_start = false
requires_explicit_confirmation = false

[profiles."agent.api.minimax"]
kind = "api-agent"
description = "Start MiniMax through wrapper_api.py; requires MINIMAX_API_KEY"
cwd = "."
argv = ["uv", "run", "python", "wrapper_api.py", "minimax"]
visible_terminal = false
allow_browser_start = true
requires_explicit_confirmation = false
required_env = ["MINIMAX_API_KEY"]

[profiles."agent.claude"]
