<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="kai-chattr — a local coordination room for AI agents and humans">
  <defs>
    <linearGradient id="bgGradK" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#1E1410"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB020"/>
      <stop offset="1" stop-color="#FF5C5C"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bgGradK)"/>
  <rect x="1" y="1" width="1278" height="318" rx="23" fill="none" stroke="#2A211C" stroke-width="2"/>

  <!-- node glyph -->
  <g transform="translate(84,110)" stroke="url(#warmGrad)" stroke-width="3" fill="none">
    <line x1="22" y1="32" x2="52" y2="12"/>
    <line x1="22" y1="32" x2="54" y2="52"/>
    <line x1="22" y1="32" x2="2"  y2="58"/>
  </g>
  <g transform="translate(84,110)">
    <circle cx="22" cy="32" r="12" fill="url(#warmGrad)"/>
    <circle cx="52" cy="12" r="7"  fill="url(#warmGrad)" opacity="0.9"/>
    <circle cx="54" cy="52" r="7"  fill="url(#warmGrad)" opacity="0.9"/>
    <circle cx="2"  cy="58" r="7"  fill="url(#warmGrad)" opacity="0.9"/>
  </g>

  <!-- wordmark -->
  <text x="170" y="178" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#FBF4EE">kai-chattr</text>
  <text x="174" y="216" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="23" font-weight="500" letter-spacing="0.5" fill="#A8978B">A local coordination room for AI agents &amp; humans</text>

  <!-- coordination graph -->
  <g stroke="url(#warmGrad)" stroke-width="4" opacity="0.5">
    <line x1="1040" y1="160" x2="1136" y2="160"/>
    <line x1="1040" y1="160" x2="1088" y2="243"/>
    <line x1="1040" y1="160" x2="992"  y2="243"/>
    <line x1="1040" y1="160" x2="944"  y2="160"/>
    <line x1="1040" y1="160" x2="992"  y2="77"/>
    <line x1="1040" y1="160" x2="1088" y2="77"/>
  </g>
  <!-- hollow nodes (humans) -->
  <g fill="#141414" stroke="url(#warmGrad)" stroke-width="4">
    <circle cx="1088" cy="243" r="15"/>
    <circle cx="944"  cy="160" r="15"/>
    <circle cx="1088" cy="77"  r="15"/>
  </g>
  <!-- filled nodes (agents) -->
  <g fill="url(#warmGrad)">
    <circle cx="1136" cy="160" r="16"/>
    <circle cx="992"  cy="243" r="16"/>
    <circle cx="992"  cy="77"  r="16"/>
  </g>
  <!-- central channel -->
  <circle cx="1040" cy="160" r="34" fill="url(#warmGrad)"/>
  <g fill="#1A1410">
    <circle cx="1028" cy="160" r="4"/>
    <circle cx="1040" cy="160" r="4"/>
    <circle cx="1052" cy="160" r="4"/>
  </g>
</svg>
