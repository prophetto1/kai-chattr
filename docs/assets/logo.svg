<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="kai-chattr logo">
  <defs>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB020"/>
      <stop offset="1" stop-color="#FF5C5C"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="#141414"/>
  <rect x="1.5" y="1.5" width="253" height="253" rx="54.5" fill="none" stroke="#2F241D" stroke-width="3"/>

  <!-- links -->
  <g stroke="url(#warmGrad)" stroke-width="5" opacity="0.55">
    <line x1="128" y1="120" x2="192" y2="120"/>
    <line x1="128" y1="120" x2="160" y2="175"/>
    <line x1="128" y1="120" x2="96"  y2="175"/>
    <line x1="128" y1="120" x2="64"  y2="120"/>
    <line x1="128" y1="120" x2="96"  y2="65"/>
    <line x1="128" y1="120" x2="160" y2="65"/>
  </g>

  <!-- ring nodes: agents (filled) + humans (hollow) -->
  <g fill="url(#warmGrad)">
    <circle cx="192" cy="120" r="13"/>
    <circle cx="96"  cy="175" r="13"/>
    <circle cx="96"  cy="65"  r="13"/>
  </g>
  <g fill="#141414" stroke="url(#warmGrad)" stroke-width="5">
    <circle cx="160" cy="175" r="12"/>
    <circle cx="64"  cy="120" r="12"/>
    <circle cx="160" cy="65"  r="12"/>
  </g>

  <!-- central channel node with chat tail -->
  <path d="M118 150 L110 178 L138 154 Z" fill="url(#warmGrad)"/>
  <circle cx="128" cy="120" r="24" fill="url(#warmGrad)"/>
  <g fill="#141414">
    <circle cx="118" cy="120" r="3.5"/>
    <circle cx="128" cy="120" r="3.5"/>
    <circle cx="138" cy="120" r="3.5"/>
  </g>
</svg>
